<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Pemrogaman Web - Kelompok 1</title>

    <!-- Iki nggowo Bootstrap teko CDN rek, ben gampang -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iki gawe nyeluk Tailwind CSS nang njero script, dadi gak usah install ribet-ribet sek -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Background e nggawe Tailwind (bg-gray-200), trus di-center kabeh posisine ndek tengah layar -->
<body class="bg-gray-200 min-h-screen flex items-center justify-center p-5">

    <!-- Bungkusane nggawe Tailwind, ben rapi dadi koyok kartu trus onok bayangane (shadow-lg) -->
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl">
        
        <!-- Judule rek, nggawe werno biru trus dikei garis ngisor (border-b) -->
        <h2 class="text-3xl font-bold text-center text-blue-700 mb-6 border-b pb-4">
            Tugas Praktikum Pemrograman Web
        </h2>

        <!-- Iki form gawe nggoleki data, nggawe campurane layout Tailwind ambek form Bootstrap -->
        <form class="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h4 class="mb-3 text-lg font-semibold text-gray-800">Golek Data Mahasiswa</h4>
            <div class="mb-3">
                <label for="cari" class="form-label font-medium text-gray-600">Lebokno Jeneng utowo NIM</label>
                <!-- Class form-control iki asline teko Bootstrap cak -->
                <input type="text" class="form-control" id="cari" placeholder="Ketik ndek kene...">
            </div>
            <!-- Tombole nggawe Bootstrap (btn btn-primary), tapi nek di-hover isok membesar titik gara-gara Tailwind -->
            <button type="submit" class="btn btn-primary hover:scale-105 transition-transform">
                Golek Data
            </button>
        </form>

        <!-- Ndek kene panggonane nampilno jeneng-jenenge arek kelompok 1 seng paling mbois -->
        <h4 class="mb-3 text-lg font-semibold text-gray-800">Arek-arek Kelompok 1:</h4>
        
        <!-- List iki nggawe list-group teko Bootstrap -->
        <ul class="list-group">
            <!-- Saben baris di-setting nek kenek mouse (hover) malih dadi biru muda -->
            <li class="list-group-item hover:bg-blue-50 transition-colors">
                <span class="font-bold">Muhammad Rendy Ramadhani</span> - 253140707111058
            </li>
            <li class="list-group-item hover:bg-blue-50 transition-colors">
                <span class="font-bold">Krisna Aji Dharma Jati</span> - 253140707111078
            </li>
            <li class="list-group-item hover:bg-blue-50 transition-colors">
                <span class="font-bold">Desbelion Seccar Ramis</span> - 253140707111074
            </li>
            <li class="list-group-item hover:bg-blue-50 transition-colors">
                <span class="font-bold">Sufyan Muzakki Hafiansyah</span> - 253140707111087
            </li>
        </ul>

    </div>

</body>
</html>
